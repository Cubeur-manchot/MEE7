services:
  mee7:
    container_name: mee7-dev
    build: .
    stop_grace_period: 3s
    volumes:
      - ./secrets/googleApi_serviceAccountKey.json:/run/secrets/googleApi_serviceAccountKey.json:ro
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/googleApi_serviceAccountKey.json
